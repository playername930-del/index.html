<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZiqReact - WhatsApp Auto React</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #1a2639 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 520px;
            width: 100%;
            background: rgba(18, 24, 38, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #2a3748;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.5);
        }

        .user-card {
            background: #1e2a3a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #2f4055;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2f4055;
        }

        .user-row:last-child {
            border-bottom: none;
        }

        .user-label {
            color: #8b9bb5;
            font-size: 14px;
            font-weight: 500;
        }

        .user-value {
            color: #e2e8f0;
            font-weight: 600;
            background: #263445;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 14px;
            border: 1px solid #3e526a;
        }

        .user-id {
            color: #2ecc71;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .channel-section {
            background: #1e2a3a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #2f4055;
        }

        .channel-label {
            color: #b0c4de;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: block;
        }

        .channel-input {
            width: 100%;
            background: #0f1a24;
            border: 2px solid #2f4055;
            border-radius: 16px;
            padding: 16px 18px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .channel-input:focus {
            border-color: #2ecc71;
            background: #0c151f;
        }

        .channel-input::placeholder {
            color: #4b637a;
        }

        .no-channel {
            color: #e67e22;
            font-size: 13px;
            margin-top: 10px;
            font-weight: 500;
            background: #2a1f0a;
            padding: 8px 14px;
            border-radius: 30px;
            display: inline-block;
            border: 1px solid #e67e22;
        }

        .emoji-section {
            margin-bottom: 24px;
        }

        .emoji-label {
            color: #b0c4de;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .emoji-label span {
            color: #e67e22;
            font-weight: 400;
        }

        .emoji-input {
            width: 100%;
            background: #0f1a24;
            border: 2px solid #2f4055;
            border-radius: 16px;
            padding: 16px 18px;
            color: white;
            font-size: 28px;
            outline: none;
            transition: all 0.2s;
            text-align: center;
            letter-spacing: 8px;
        }

        .emoji-input:focus {
            border-color: #2ecc71;
        }

        .emoji-counter {
            text-align: right;
            color: #8b9bb5;
            font-size: 13px;
            margin-top: 8px;
        }

        .emoji-counter span {
            color: #2ecc71;
            font-weight: 700;
        }

        .preview-box {
            background: #0f1a24;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px dashed #2f4055;
            text-align: center;
        }

        .preview-title {
            color: #8b9bb5;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .preview-emoji {
            font-size: 44px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .preview-emoji span {
            background: #1e2a3a;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid #2ecc71;
            animation: pop 0.2s ease;
            box-shadow: 0 5px 0 #0a4a2f;
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .info-text {
            color: #5f7d9c;
            font-size: 12px;
            text-align: center;
            margin: 16px 0;
            background: #0f1a24;
            padding: 12px;
            border-radius: 40px;
            border: 1px solid #2f4055;
        }

        .send-btn {
            width: 100%;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 20px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.1s ease;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid #2ecc71;
            box-shadow: 0 8px 0 #0f8a4a;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #0f8a4a;
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #0f8a4a;
        }

        .send-btn:disabled {
            background: #4a5a6e;
            border-color: #5f7d9c;
            box-shadow: 0 5px 0 #2f4055;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            color: #4b637a;
            font-size: 12px;
        }

        .footer span {
            color: #2ecc71;
            font-weight: 600;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #1e2a3a;
            border-radius: 32px;
            padding: 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            border: 1px solid #2ecc71;
            box-shadow: 0 20px 0 #0a4a2f;
        }

        .modal-card.error {
            border-color: #e74c3c;
            box-shadow: 0 20px 0 #962d22;
        }

        .modal-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .modal-title {
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-desc {
            color: #b0c4de;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .modal-stats {
            background: #0f1a24;
            border-radius: 20px;
            padding: 16px;
            margin: 20px 0;
            border: 1px solid #2f4055;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #2f4055;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #8b9bb5;
        }

        .stat-value {
            color: #2ecc71;
            font-weight: 700;
        }

        .modal-close {
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 16px 32px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            box-shadow: 0 5px 0 #0f8a4a;
        }

        .modal-close.error {
            background: #e74c3c;
            box-shadow: 0 5px 0 #962d22;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ZIQREACT CARD -->
        <div class="user-card">
            <div class="user-row">
                <span class="user-label">ZIQREACT</span>
                <span class="user-value">VERIFIED</span>
            </div>
            <div class="user-row">
                <span class="user-label">USER ID</span>
                <span class="user-id">ZIQ-894720</span>
            </div>
        </div>

        <!-- CHANNEL LINK -->
        <div class="channel-section">
            <label class="channel-label">WHATSAPP CHANNEL LINK</label>
            <input type="text" class="channel-input" id="channelLink" placeholder="https://whatsapp.com/channel/...">
            <div class="no-channel" id="noChannelMsg">🔔 LINK TIDAK VALID</div>
        </div>

        <!-- EMOJI INPUT -->
        <div class="emoji-section">
            <div class="emoji-label">
                <span>EMOJI REACTION</span>
                <span>MAKSIMAL 4</span>
            </div>
            <input type="text" class="emoji-input" id="emojiInput" placeholder="😢😢😢😢" maxlength="20">
            <div class="emoji-counter">
                <span id="emojiCount">0</span>/4 EMOJI
            </div>
        </div>

        <!-- PREVIEW -->
        <div class="preview-box">
            <div class="preview-title">PREVIEW</div>
            <div class="preview-emoji" id="previewEmoji">Ketik emoji di atas...</div>
        </div>

        <div class="info-text">
            ⚡ 1 REAKSI = 1 EMOJI • GRATIS
        </div>

        <!-- KIRIM BUTTON -->
        <button class="send-btn" id="sendBtn" disabled>KIRIM REAKSI</button>

        <div class="footer">
            © 2026 <span>ZiqReact</span> • BY ZIQRI
        </div>
    </div>

    <!-- MODAL SUKSES -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-card">
            <div class="modal-icon">✅</div>
            <div class="modal-title">SUCCESS!</div>
            <div class="modal-desc">Request berhasil dikirim!</div>
            <div class="modal-stats" id="successStats">
                <div class="stat-item">
                    <span class="stat-label">Channel ID</span>
                    <span class="stat-value" id="successChannel">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total Reaksi</span>
                    <span class="stat-value" id="successTotal">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Emoji</span>
                    <span class="stat-value" id="successEmoji">-</span>
                </div>
            </div>
            <button class="modal-close" onclick="closeSuccessModal()">OK</button>
        </div>
    </div>

    <!-- MODAL GAGAL -->
    <div class="modal-overlay" id="errorModal">
        <div class="modal-card error">
            <div class="modal-icon">❌</div>
            <div class="modal-title">GAGAL!</div>
            <div class="modal-desc" id="errorMessage">Terjadi kesalahan</div>
            <button class="modal-close error" onclick="closeErrorModal()">OK</button>
        </div>
    </div>

    <script>
        // ===== KONFIGURASI API WHATSAPP =====
        const WHATSAPP_TOKEN = 'EAAK8iq6y3ckBQ6ext6UqWiSjUxibRG525xPG2WqftXZCsadBWIwMg6EFv0Y8txN2bJ8kuZCiokNBc75C6ySqErzSB3tfUhiccGACtaAXpCjMZCU3dqfIGjnGuK1xgal75LLZB4NOtwT0ddewfUZB44iNvZAZA5nHIuwTtYCsFmCfV4ja5AQ3MIekooaS4eIn5ClMvoHsL6H6Yo5c9KXHk6wZA33u22FbZATotGI1ZAcngBGtmbASk44QYvaAZDZD';
        const PHONE_ID = '1058473540647965';
        
        // ===== TARGET NOMOR (UDAH DIISI) =====
        const TARGET_NUMBER = '628999768366';
        
        // ===== STATE =====
        let currentEmoji = '';

        // ===== DOM ELEMENTS =====
        const channelLink = document.getElementById('channelLink');
        const emojiInput = document.getElementById('emojiInput');
        const previewEmoji = document.getElementById('previewEmoji');
        const emojiCount = document.getElementById('emojiCount');
        const noChannelMsg = document.getElementById('noChannelMsg');
        const sendBtn = document.getElementById('sendBtn');
        const successModal = document.getElementById('successModal');
        const errorModal = document.getElementById('errorModal');
        const errorMessage = document.getElementById('errorMessage');

        // ===== VALIDASI CHANNEL LINK =====
        channelLink.addEventListener('input', function() {
            const link = this.value.trim();
            
            if (link.includes('whatsapp.com/channel/')) {
                noChannelMsg.style.display = 'none';
                validateInputs();
            } else {
                noChannelMsg.style.display = 'block';
                sendBtn.disabled = true;
            }
        });

        // ===== VALIDASI EMOJI =====
        emojiInput.addEventListener('input', function() {
            // Ambil emoji aja
            const emojis = this.value.match(/([\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}])/gu) || [];
            
            // Batasi max 4 emoji
            const limited = emojis.slice(0, 4);
            currentEmoji = limited.join('');
            
            // Update input
            this.value = currentEmoji;
            
            // Update counter
            emojiCount.textContent = limited.length;
            
            // Update preview
            if (limited.length > 0) {
                previewEmoji.innerHTML = limited.map(e => `<span>${e}</span>`).join('');
            } else {
                previewEmoji.innerHTML = 'Ketik emoji di atas...';
            }
            
            validateInputs();
        });

        // ===== VALIDASI SEMUA =====
        function validateInputs() {
            const channelValid = channelLink.value.includes('whatsapp.com/channel/');
            const emojiValid = currentEmoji.length > 0;
            
            sendBtn.disabled = !(channelValid && emojiValid);
        }

        // ===== EKSTRAK CHANNEL ID DARI LINK =====
        function extractChannelId(link) {
            const match = link.match(/channel\/([a-zA-Z0-9]+)/);
            return match ? match[1] : null;
        }

        // ===== GENERATE MESSAGE ID =====
        function generateMessageId() {
            return 'wamid.HBgLMTY0NjcwNDM1OTUVAgASGBQzQUZCMTY0MDc2MUYwNzBDNTY5MAA=';
        }

        // ===== KIRIM REACTION VIA API =====
        async function sendReaction(to, emoji) {
            try {
                const response = await fetch(`https://graph.facebook.com/v22.0/${PHONE_ID}/messages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${WHATSAPP_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messaging_product: 'whatsapp',
                        recipient_type: 'individual',
                        to: to,
                        type: 'reaction',
                        reaction: {
                            message_id: generateMessageId(),
                            emoji: emoji
                        }
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'Gagal kirim');
                }

                return await response.json();
                
            } catch (error) {
                console.log('API Error:', error);
                throw error;
            }
        }

        // ===== KIRIM REAKSI BERKALI-KALI =====
        async function sendMultipleReactions(to, emoji, count) {
            const results = [];
            for (let i = 0; i < count; i++) {
                await new Promise(r => setTimeout(r, 300));
                const result = await sendReaction(to, emoji);
                results.push(result);
            }
            return results;
        }

        // ===== TOMBOL KIRIM =====
        sendBtn.addEventListener('click', async function() {
            const link = channelLink.value.trim();
            const channelId = extractChannelId(link);
            const emoji = currentEmoji;
            
            if (!channelId) {
                alert('Link channel tidak valid!');
                return;
            }

            sendBtn.disabled = true;
            sendBtn.textContent = 'MENGIRIM...';

            try {
                const totalReaksi = emoji.length;
                
                await sendMultipleReactions(TARGET_NUMBER, emoji, totalReaksi);
                
                // Tampilkan modal sukses
                document.getElementById('successChannel').textContent = channelId.slice(0, 8) + '...';
                document.getElementById('successTotal').textContent = totalReaksi + ' reaksi';
                document.getElementById('successEmoji').textContent = emoji;
                
                successModal.style.display = 'flex';
                
                // Reset form
                emojiInput.value = '';
                previewEmoji.innerHTML = 'Ketik emoji di atas...';
                emojiCount.textContent = '0';
                channelLink.value = '';
                noChannelMsg.style.display = 'block';
                sendBtn.disabled = true;
                
            } catch (error) {
                // Tampilkan modal error
                errorMessage.textContent = error.message || 'Terjadi kesalahan saat mengirim';
                errorModal.style.display = 'flex';
                
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'KIRIM REAKSI';
                validateInputs();
            }
        });

        // ===== CLOSE MODAL =====
        function closeSuccessModal() {
            successModal.style.display = 'none';
        }

        function closeErrorModal() {
            errorModal.style.display = 'none';
        }

        window.closeSuccessModal = closeSuccessModal;
        window.closeErrorModal = closeErrorModal;

        // ===== ANTI F12 =====
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });
    </script>
</body>
  </html>
