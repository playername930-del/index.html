<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto ke HD - BY ZIQRI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 800;
            color: #1e1e2f;
            margin-bottom: 5px;
        }

        .header p {
            color: #4a4a6a;
            font-size: 16px;
        }

        .watermark {
            display: inline-block;
            background: #e0e7ff;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            color: #4f46e5;
            margin-top: 10px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8fafc;
            margin-bottom: 25px;
        }

        .upload-area:hover {
            border-color: #4f46e5;
            background: #eef2ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upload-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .upload-info {
            display: flex;
            gap: 20px;
            justify-content: center;
            color: #64748b;
            font-size: 13px;
            margin-top: 10px;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #ef4444;
            color: #b91c1c;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .preview-container {
            display: none;
            margin-bottom: 25px;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .preview-box {
            background: #f8fafc;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #e2e8f0;
        }

        .preview-label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .image-box {
            width: 100%;
            aspect-ratio: 1/1;
            background: #f1f5f9;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e2e8f0;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .image-placeholder {
            color: #94a3b8;
            text-align: center;
            padding: 20px;
        }

        .quality-section {
            margin-bottom: 20px;
        }

        .quality-label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
        }

        .quality-options {
            display: flex;
            gap: 12px;
        }

        .quality-item {
            flex: 1;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quality-item:hover {
            border-color: #4f46e5;
            background: #eef2ff;
        }

        .quality-item.selected {
            border-color: #4f46e5;
            background: #eef2ff;
        }

        .quality-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .quality-name {
            font-weight: 600;
            color: #1e293b;
        }

        .process-btn {
            width: 100%;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .process-btn:hover:not(:disabled) {
            background: #4338ca;
            transform: scale(1.02);
        }

        .process-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .api-info {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 15px;
            font-size: 14px;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar {
            height: 6px;
            background: #f1f5f9;
            border-radius: 3px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #4f46e5;
            transition: width 0.3s;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-primary {
            flex: 1;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-secondary {
            flex: 1;
            background: #f1f5f9;
            color: #334155;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Foto ke HD</h1>
            <p>Tingkatkan kualitas foto buram jadi jernih</p>
            <div class="watermark">BY ZIQRI</div>
        </div>

        <div class="card">
            <div class="error-message" id="errorMessage"></div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-title">Pilih foto dari galeri</div>
                <div class="upload-info">
                    <span>📱 JPG, PNG, WebP</span>
                    <span>⚡ Maks 10 MB</span>
                </div>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div class="preview-container" id="previewContainer">
                <div class="preview-grid">
                    <div class="preview-box">
                        <div class="preview-label">🖼️ Sebelum</div>
                        <div class="image-box" id="originalPreview">
                            <div class="image-placeholder">Belum ada foto</div>
                        </div>
                    </div>
                    <div class="preview-box">
                        <div class="preview-label">✨ Sesudah</div>
                        <div class="image-box" id="resultPreview">
                            <div class="image-placeholder">Hasil akan muncul</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="quality-section">
                <div class="quality-label">Pilih kualitas:</div>
                <div class="quality-options">
                    <div class="quality-item selected" id="opt2x">
                        <div class="quality-icon">⚡</div>
                        <div class="quality-name">2x HD</div>
                    </div>
                    <div class="quality-item" id="opt4x">
                        <div class="quality-icon">🔥</div>
                        <div class="quality-name">4x Ultra</div>
                    </div>
                </div>
            </div>

            <button class="process-btn" id="processBtn" disabled>Proses ke HD</button>

            <div class="api-info">
                <span>🌐 API Server: siap</span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="loadingModal">
        <div class="modal-card">
            <div class="spinner"></div>
            <div class="modal-title" id="loadingTitle">Memproses</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="loadingDesc">Mengirim ke server...</div>
        </div>
    </div>

    <div class="modal-overlay" id="successModal">
        <div class="modal-card">
            <div class="modal-title">✅ Berhasil!</div>
            <div class="btn-group">
                <button class="btn-secondary" id="closeModal">Tutup</button>
                <button class="btn-primary" id="downloadBtn">Download</button>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIG =====
        const API_URL = 'https://api.deepai.org/api/torch-srgan';
        const API_KEY = 'quickstart-QUdJIGlzIGNvbWluZy4uLi4K'; // DeepAI free key

        let selectedFile = null;
        let selectedQuality = '2x';
        let resultBlob = null;

        // DOM elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const originalPreview = document.getElementById('originalPreview');
        const resultPreview = document.getElementById('resultPreview');
        const previewContainer = document.getElementById('previewContainer');
        const processBtn = document.getElementById('processBtn');
        const loadingModal = document.getElementById('loadingModal');
        const successModal = document.getElementById('successModal');
        const errorMessage = document.getElementById('errorMessage');
        const progressFill = document.getElementById('progressFill');
        const loadingDesc = document.getElementById('loadingDesc');

        // Upload area
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#4f46e5';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#cbd5e1';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#cbd5e1';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (file.size > 10 * 1024 * 1024) {
                showError('File maksimal 10 MB');
                return;
            }

            selectedFile = file;
            processBtn.disabled = false;
            errorMessage.style.display = 'none';
            
            const reader = new FileReader();
            reader.onload = (e) => {
                originalPreview.innerHTML = `<img src="${e.target.result}" alt="Original">`;
                previewContainer.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function showError(msg) {
            errorMessage.textContent = '❌ ' + msg;
            errorMessage.style.display = 'block';
        }

        // Quality selection
        document.querySelectorAll('.quality-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.quality-item').forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                selectedQuality = this.id === 'opt2x' ? '2x' : '4x';
            });
        });

        // Process button
        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loadingModal.style.display = 'flex';
            processBtn.disabled = true;
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 5;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
            }, 200);

            try {
                loadingDesc.textContent = 'Mengirim ke server DeepAI...';

                const formData = new FormData();
                formData.append('image', selectedFile);

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'api-key': API_KEY
                    },
                    body: formData
                });

                if (!response.ok) throw new Error('Gagal konek ke server');

                const data = await response.json();
                
                // Download hasil dari URL
                const imgResponse = await fetch(data.output_url);
                resultBlob = await imgResponse.blob();

                const url = URL.createObjectURL(resultBlob);
                resultPreview.innerHTML = `<img src="${url}" alt="HD">`;

                clearInterval(interval);
                progressFill.style.width = '100%';
                
                setTimeout(() => {
                    loadingModal.style.display = 'none';
                    successModal.style.display = 'flex';
                    processBtn.disabled = false;
                }, 500);

            } catch (error) {
                clearInterval(interval);
                loadingModal.style.display = 'none';
                showError('Gagal: ' + error.message);
                processBtn.disabled = false;
            }
        });

        // Buttons
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (resultBlob) {
                const url = URL.createObjectURL(resultBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'foto_hd_by_ziqri.jpg';
                a.click();
            }
            successModal.style.display = 'none';
        });

        document.getElementById('closeModal').addEventListener('click', () => {
            successModal.style.display = 'none';
        });
    </script>
</body>
              </html>
